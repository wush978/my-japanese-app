<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>好玩的日文單字卡</title>
    <style>
        :root {
            --primary-bg: #FFF9E6;
            --header-bg: #FFB347;
            --card-front: #FFFFFF;
            --card-back: #FFF0F5;
            --text-main: #333333;
            --btn-wrong: #FF6B6B;
            --btn-correct: #4ECDC4;
        }

        body {
            font-family: 'Comic Sans MS', 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            touch-action: manipulation; /* 防止連點放大 */
        }

        /* 頂部控制面板與計分板 */
        header {
            width: 100%;
            background-color: var(--header-bg);
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .controls select {
            font-size: 1.1rem;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #FFF;
            background-color: #FFF;
            color: var(--text-main);
            outline: none;
            margin: 0 5px;
            cursor: pointer;
        }

        .score-board {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFF;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* 主畫面與字卡容器 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-container {
            width: 90%;
            max-width: 400px;
            aspect-ratio: 4 / 3;
            perspective: 1000px; /* 3D 空間透視 */
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; /* 保留 3D 結構 */
        }

        /* 翻牌觸發 */
        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 隱藏背面 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        .card-front {
            background-color: var(--card-front);
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            color: #E74C3C;
        }

        /* 底部評分按鈕 */
        footer {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100px;
        }

        .rating-buttons {
            display: flex;
            gap: 20px;
            transition: opacity 0.3s ease;
        }

        .rating-buttons.hidden {
            opacity: 0;
            pointer-events: none; /* 隱藏時不可點擊 */
        }

        .rating-buttons button {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .rating-buttons button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        #btn-wrong { background-color: var(--btn-wrong); }
        #btn-correct { background-color: var(--btn-correct); }

        /* RWD 平板與手機微調 */
        @media (max-width: 480px) {
            .card-face { font-size: 2.8rem; }
            .rating-buttons button { font-size: 1.1rem; padding: 12px 20px; }
            .controls select { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <select id="topic-select">
                <option value="fruits">🍓 水果 (Fruits)</option>
                <option value="sports">⚽ 運動 (Sports)</option>
            </select>
            <select id="mode-select">
                <option value="jp2ch">看日文 猜中文</option>
                <option value="ch2jp">看中文 猜日文</option>
            </select>
        </div>
        <div class="score-board" id="score-board">⭐ 已記住：0 / 5</div>
    </header>

    <main>
        <div class="card-container" id="card-container">
            <div class="card-inner" id="card-inner">
                <div class="card-face card-front" id="card-front">
                    讀取中...
                </div>
                <div class="card-face card-back" id="card-back">
                    讀取中...
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="rating-buttons hidden" id="rating-buttons">
            <button id="btn-wrong">❌ 還沒記住</button>
            <button id="btn-correct">⭐ 我答對了</button>
        </div>
    </footer>

    <script>
        // 狀態變數
        let wordsData = [];
        let currentIndex = 0;
        let score = 0;
        let isFlipped = false;

        // DOM 元素
        const topicSelect = document.getElementById('topic-select');
        const modeSelect = document.getElementById('mode-select');
        const cardInner = document.getElementById('card-inner');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const ratingButtons = document.getElementById('rating-buttons');
        const scoreBoard = document.getElementById('score-board');
        const btnWrong = document.getElementById('btn-wrong');
        const btnCorrect = document.getElementById('btn-correct');

        // 打亂陣列順序，讓小朋友每次玩的順序都不一樣
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 讀取 JSON 資料
        async function loadData() {
            const topic = topicSelect.value;
            try {
                // 使用 fetch 讀取 data 資料夾內的 json
                const response = await fetch(`data/${topic}.json`);
                if (!response.ok) throw new Error('找不到檔案');
                
                wordsData = await response.json();
                shuffle(wordsData); // 隨機洗牌
                currentIndex = 0;
                renderCard();
            } catch (error) {
                console.error("讀取資料失敗:", error);
                cardFront.textContent = "⚠️ 找不到資料";
                cardBack.textContent = "請確認是否在伺服器環境運行";
            }
        }

        // 更新字卡內容與狀態
        function renderCard() {
            if (wordsData.length === 0) return;
            
            const currentWord = wordsData[currentIndex];
            const mode = modeSelect.value;

            // 確保翻回正面且隱藏按鈕
            isFlipped = false;
            cardInner.classList.remove('flipped');
            ratingButtons.classList.add('hidden');

            if (mode === 'jp2ch') {
                cardFront.textContent = currentWord.jp;
                cardBack.textContent = currentWord.ch;
            } else {
                cardFront.textContent = currentWord.ch;
                cardBack.textContent = currentWord.jp;
            }
        }

        // Web Speech API 日文發音
        function speakJapanese(text) {
            if ('speechSynthesis' in window) {
                // 先取消正在播放的語音
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP'; // 設定為日文
                utterance.rate = 0.85;    // 語速稍微放慢適合小朋友聽
                window.speechSynthesis.speak(utterance);
            }
        }

        // 點擊字卡翻面
        document.getElementById('card-container').addEventListener('click', () => {
            if (isFlipped || wordsData.length === 0) return; // 如果已經翻面則不動作
            
            isFlipped = true;
            cardInner.classList.add('flipped');
            ratingButtons.classList.remove('hidden');

            // 不管是哪種模式，翻面時一律唸出日文發音
            const currentWord = wordsData[currentIndex];
            speakJapanese(currentWord.jp);
        });

        // 換下一個單字
        function nextWord() {
            currentIndex = (currentIndex + 1) % wordsData.length; // 循環播放
            
            // 翻回正面，隱藏按鈕
            cardInner.classList.remove('flipped');
            ratingButtons.classList.add('hidden');
            
            // 等待翻牌動畫 (0.6秒) 完成一半時替換文字，視覺上最順暢
            setTimeout(renderCard, 300);
        }

        // 更新分數與檢查滿分
        function updateScore() {
            scoreBoard.textContent = `⭐ 已記住：${score} / 5`;
            if (score >= 5) {
                setTimeout(() => {
                    alert('🎉 恭喜滿分！你太棒了！');
                    score = 0;
                    scoreBoard.textContent = `⭐ 已記住：0 / 5`;
                }, 300); // 等待下一個單字的動畫跑完再跳出通知
            }
        }

        // 事件監聽：切換主題或模式
        topicSelect.addEventListener('change', loadData);
        modeSelect.addEventListener('change', renderCard);

        // 事件監聽：評分按鈕
        btnWrong.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡觸發字卡點擊
            nextWord();
        });

        btnCorrect.addEventListener('click', (e) => {
            e.stopPropagation();
            score++;
            updateScore();
            nextWord();
        });

        // 初始化：網頁載入時立刻讀取資料
        window.onload = loadData;
    </script>
</body>
</html>
