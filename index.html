<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>好玩的日文單字卡</title>
    <style>
        :root {
            --primary-bg: #FFF9E6;
            --header-bg: #FFB347;
            --card-front: #FFFFFF;
            --card-back: #FFF0F5;
            --text-main: #333333;
            --btn-wrong: #FF6B6B;
            --btn-correct: #4ECDC4;
        }

        body {
            font-family: 'Comic Sans MS', 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            touch-action: manipulation;
        }

        header {
            width: 100%;
            background-color: var(--header-bg);
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .controls select {
            font-size: 1.1rem;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #FFF;
            background-color: #FFF;
            color: var(--text-main);
            outline: none;
            margin: 0 5px;
            cursor: pointer;
        }

        .score-board {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFF;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 5px 15px;
            border-radius: 20px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-container {
            width: 90%;
            max-width: 400px;
            aspect-ratio: 4 / 3;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        .card-front {
            background-color: var(--card-front);
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            color: #E74C3C;
        }

        footer {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100px;
        }

        .rating-buttons {
            display: flex;
            gap: 20px;
            transition: opacity 0.3s ease;
        }

        .rating-buttons.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .rating-buttons button {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .rating-buttons button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        #btn-wrong { background-color: var(--btn-wrong); }
        #btn-correct { background-color: var(--btn-correct); }

        @media (max-width: 480px) {
            .card-face { font-size: 2.8rem; }
            .rating-buttons button { font-size: 1.1rem; padding: 12px 20px; }
            .controls select { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <select id="topic-select">
                <option value="">載入清單中...</option>
            </select>
            <select id="mode-select">
                <option value="jp2ch">看日文 猜中文</option>
                <option value="ch2jp">看中文 猜日文</option>
            </select>
        </div>
        <div class="score-board" id="score-board">⭐ 已記住：0 / 5</div>
    </header>

    <main>
        <div class="card-container" id="card-container">
            <div class="card-inner" id="card-inner">
                <div class="card-face card-front" id="card-front">讀取中...</div>
                <div class="card-face card-back" id="card-back">讀取中...</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="rating-buttons hidden" id="rating-buttons">
            <button id="btn-wrong">❌ 還沒記住</button>
            <button id="btn-correct">⭐ 我答對了</button>
        </div>
    </footer>

    <script>
        // --- 狀態變數 ---
        let wordsData = [];
        let currentIndex = 0;
        let score = 0;
        let isFlipped = false;

        // --- DOM 元素 ---
        const topicSelect = document.getElementById('topic-select');
        const modeSelect = document.getElementById('mode-select');
        const cardInner = document.getElementById('card-inner');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const ratingButtons = document.getElementById('rating-buttons');
        const scoreBoard = document.getElementById('score-board');
        const btnWrong = document.getElementById('btn-wrong');
        const btnCorrect = document.getElementById('btn-correct');

        // --- 快取與 API 設定 ---
        const CACHE_KEY = 'jp_app_topics';
        const CACHE_TIME_KEY = 'jp_app_topics_time';
        const CACHE_TTL = 24 * 60 * 60 * 1000; // 24小時
        const GITHUB_API_URL = 'https://api.github.com/repos/wush978/my-japanese-app/contents/data';
        
        // --- 選單顯示名稱對照表 ---
        // 若新增的 json 檔名沒有寫在這裡，選單會直接顯示英文字母大寫開頭（例如 animals -> Animals）
        const topicDisplayNames = {
            'fruits': '🍓 水果 (Fruits)',
            'sports': '🏃 運動 (Sports)',
            'soccer': '⚽ 足球常用單字'
        };

        // 1. 初始化與讀取目錄
        async function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const forceRefresh = urlParams.get('refresh') === '1';

            if (forceRefresh) {
                // 自動清除網址上的 ?refresh=1，避免下次重整時又發送 API 請求
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: newUrl}, '', newUrl);
            }

            const cachedData = localStorage.getItem(CACHE_KEY);
            const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
            const now = Date.now();
            let fileIds = [];

            // 判斷是否使用快取
            if (!forceRefresh && cachedData && cachedTime && (now - cachedTime < CACHE_TTL)) {
                console.log('使用本地快取的檔案目錄');
                fileIds = JSON.parse(cachedData);
            } else {
                console.log('向 GitHub API 請求最新檔案目錄');
                try {
                    const response = await fetch(GITHUB_API_URL);
                    if (!response.ok) throw new Error('無法取得 GitHub 目錄');
                    const data = await response.json();
                    
                    // 過濾出 .json 檔案並去掉副檔名
                    fileIds = data
                        .filter(item => item.name.endsWith('.json'))
                        .map(item => item.name.replace('.json', ''));
                    
                    // 更新本地快取
                    localStorage.setItem(CACHE_KEY, JSON.stringify(fileIds));
                    localStorage.setItem(CACHE_TIME_KEY, now.toString());
                } catch (error) {
                    console.error('API 讀取失敗:', error);
                    // 如果 API 失敗又沒有快取，提供預設選項確保網頁不會壞掉
                    fileIds = cachedData ? JSON.parse(cachedData) : ['fruits', 'sports', 'soccer'];
                }
            }

            populateTopicSelect(fileIds);
            loadData(); // 目錄載入完畢後，開始讀取第一個選項的單字
        }

        // 2. 建立下拉選單
        function populateTopicSelect(fileIds) {
            topicSelect.innerHTML = '';
            if (fileIds.length === 0) {
                const option = document.createElement('option');
                option.textContent = '找不到資料';
                topicSelect.appendChild(option);
                return;
            }

            fileIds.forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                // 優先使用對照表名稱，若無則將首字母大寫
                option.textContent = topicDisplayNames[id] || (id.charAt(0).toUpperCase() + id.slice(1));
                topicSelect.appendChild(option);
            });
        }

        // 3. 讀取單字 JSON 資料
        async function loadData() {
            if (!topicSelect.value) return;
            const topic = topicSelect.value;
            try {
                // 在檔名後加上時間戳避免瀏覽器快取舊的 json 內容
                const response = await fetch(`data/${topic}.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('找不到單字檔案');
                
                wordsData = await response.json();
                shuffle(wordsData);
                currentIndex = 0;
                renderCard();
            } catch (error) {
                console.error("讀取單字失敗:", error);
                cardFront.textContent = "⚠️ 找不到資料";
                cardBack.textContent = "請確認資料夾中是否有此檔案";
            }
        }

        // --- 核心互動邏輯 ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderCard() {
            if (wordsData.length === 0) return;
            const currentWord = wordsData[currentIndex];
            const mode = modeSelect.value;

            isFlipped = false;
            cardInner.classList.remove('flipped');
            ratingButtons.classList.add('hidden');

            if (mode === 'jp2ch') {
                cardFront.textContent = currentWord.jp;
                cardBack.textContent = currentWord.ch;
            } else {
                cardFront.textContent = currentWord.ch;
                cardBack.textContent = currentWord.jp;
            }
        }

        function speakJapanese(text) {
            if ('speechSynthesis' in window) {
                // 過濾掉括號內的平假名發音提示，避免唸兩次
                const cleanText = text.replace(/ \(.*?\)/g, '');
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % wordsData.length;
            cardInner.classList.remove('flipped');
            ratingButtons.classList.add('hidden');
            setTimeout(renderCard, 300);
        }

        function updateScore() {
            scoreBoard.textContent = `⭐ 已記住：${score} / 5`;
            if (score >= 5) {
                setTimeout(() => {
                    alert('🎉 恭喜滿分！你太棒了！');
                    score = 0;
                    scoreBoard.textContent = `⭐ 已記住：0 / 5`;
                }, 300);
            }
        }

        // --- 事件監聽 ---
        document.getElementById('card-container').addEventListener('click', () => {
            if (isFlipped || wordsData.length === 0) return; 
            isFlipped = true;
            cardInner.classList.add('flipped');
            ratingButtons.classList.remove('hidden');
            speakJapanese(wordsData[currentIndex].jp);
        });

        topicSelect.addEventListener('change', loadData);
        modeSelect.addEventListener('change', renderCard);

        btnWrong.addEventListener('click', (e) => {
            e.stopPropagation();
            nextWord();
        });

        btnCorrect.addEventListener('click', (e) => {
            e.stopPropagation();
            score++;
            updateScore();
            nextWord();
        });

        // 啟動 App
        window.onload = initApp;
    </script>
</body>
</html>
