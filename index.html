<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>好玩的日文單字卡</title>
    <!-- 引入煙火特效套件 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-bg: #FFF9E6;
            --header-bg: #FFB347;
            --card-front: #FFFFFF;
            --card-back: #FFF0F5;
            --text-main: #333333;
            --btn-wrong: #FF6B6B;
            --btn-correct: #4ECDC4;
        }

        body {
            font-family: 'Comic Sans MS', 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            touch-action: manipulation;
        }

        header {
            width: 100%;
            background-color: var(--header-bg);
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .controls select {
            font-size: 1.1rem;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #FFF;
            background-color: #FFF;
            color: var(--text-main);
            outline: none;
            margin: 0 5px;
            cursor: pointer;
        }

        .score-board {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFF;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 5px 15px;
            border-radius: 20px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-container {
            width: 90%;
            max-width: 400px;
            aspect-ratio: 4 / 3;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        .card-front {
            background-color: var(--card-front);
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            color: #E74C3C;
        }

        footer {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100px;
        }

        .rating-buttons {
            display: flex;
            gap: 20px;
            transition: opacity 0.3s ease;
        }

        .rating-buttons.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .rating-buttons button {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .rating-buttons button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        #btn-wrong { background-color: var(--btn-wrong); }
        #btn-correct { background-color: var(--btn-correct); }

        @media (max-width: 480px) {
            .card-face { font-size: 2.8rem; }
            .rating-buttons button { font-size: 1.1rem; padding: 12px 20px; }
            .controls select { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <select id="topic-select">
                <option value="">載入清單中...</option>
            </select>
            <select id="mode-select">
                <option value="jp2ch">看日文 猜中文</option>
                <option value="ch2jp">看中文 猜日文</option>
            </select>
        </div>
        <!-- 分數顯示調整為持續累加模式 -->
        <div class="score-board" id="score-board">⭐ 已記住：0</div>
    </header>

    <main>
        <div class="card-container" id="card-container">
            <div class="card-inner" id="card-inner">
                <div class="card-face card-front" id="card-front">讀取中...</div>
                <div class="card-face card-back" id="card-back">讀取中...</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="rating-buttons hidden" id="rating-buttons">
            <button id="btn-wrong">❌ 還沒記住</button>
            <button id="btn-correct">⭐ 我答對了</button>
        </div>
    </footer>

    <script>
        // --- 狀態變數 ---
        let wordsData = [];
        let currentIndex = 0;
        let score = 0;
        let isFlipped = false;

        // --- DOM 元素 ---
        const topicSelect = document.getElementById('topic-select');
        const modeSelect = document.getElementById('mode-select');
        const cardInner = document.getElementById('card-inner');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const ratingButtons = document.getElementById('rating-buttons');
        const scoreBoard = document.getElementById('score-board');
        const btnWrong = document.getElementById('btn-wrong');
        const btnCorrect = document.getElementById('btn-correct');

        // --- 快取與 API 設定 ---
        const CACHE_KEY = 'jp_app_topics';
        const CACHE_TIME_KEY = 'jp_app_topics_time';
        const CACHE_TTL = 24 * 60 * 60 * 1000;
        const GITHUB_API_URL = 'https://api.github.com/repos/wush978/my-japanese-app/contents/data';
        
        // --- 選單顯示名稱對照表 ---
        const topicDisplayNames = {
            'fruits': '🍓 水果 (Fruits)',
            'sports': '🏃 運動 (Sports)',
            'soccer': '⚽ 足球常用單字',
            'minru_life': '🏠 生活單字'
        };

        // 1. 初始化與讀取目錄
        async function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const forceRefresh = urlParams.get('refresh') === '1';

            if (forceRefresh) {
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: newUrl}, '', newUrl);
            }

            const cachedData = localStorage.getItem(CACHE_KEY);
            const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
            const now = Date.now();
            let fileIds = [];

            if (!forceRefresh && cachedData && cachedTime && (now - cachedTime < CACHE_TTL)) {
                fileIds = JSON.parse(cachedData);
            } else {
                try {
                    const response = await fetch(GITHUB_API_URL);
                    if (!response.ok) throw new Error('無法取得 GitHub 目錄');
                    const data = await response.json();
                    
                    fileIds = data
                        .filter(item => item.name.endsWith('.json'))
                        .map(item => item.name.replace('.json', ''));
                    
                    localStorage.setItem(CACHE_KEY, JSON.stringify(fileIds));
                    localStorage.setItem(CACHE_TIME_KEY, now.toString());
                } catch (error) {
                    console.error('API 讀取失敗:', error);
                    fileIds = cachedData ? JSON.parse(cachedData) : ['fruits', 'sports', 'soccer'];
                }
            }

            populateTopicSelect(fileIds);
            loadData();
        }

        // 2. 建立下拉選單
        function populateTopicSelect(fileIds) {
            topicSelect.innerHTML = '';
            if (fileIds.length === 0) {
                const option = document.createElement('option');
                option.textContent = '找不到資料';
                topicSelect.appendChild(option);
                return;
            }

            fileIds.forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = topicDisplayNames[id] || (id.charAt(0).toUpperCase() + id.slice(1));
                topicSelect.appendChild(option);
            });
        }

        // 3. 讀取單字 JSON 資料
        async function loadData() {
            if (!topicSelect.value) return;
            const topic = topicSelect.value;
            try {
                const response = await fetch(`data/${topic}.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('找不到單字檔案');
                
                wordsData = await response.json();
                shuffle(wordsData);
                currentIndex = 0;
                
                // 更換主題時重置分數
                score = 0;
                scoreBoard.textContent = `⭐ 已記住：${score}`;
                
                renderCard();
            } catch (error) {
                console.error("讀取單字失敗:", error);
                cardFront.textContent = "⚠️ 找不到資料";
                cardBack.textContent = "請確認檔案是否存在";
            }
        }

        // --- 核心互動邏輯 ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderCard() {
            if (wordsData.length === 0) return;
            const currentWord = wordsData[currentIndex];
            const mode = modeSelect.value;

            isFlipped = false;
            cardInner.classList.remove('flipped');
            ratingButtons.classList.add('hidden');

            if (mode === 'jp2ch') {
                cardFront.textContent = currentWord.jp;
                cardBack.textContent = currentWord.ch;
            } else {
                cardFront.textContent = currentWord.ch;
                cardBack.textContent = currentWord.jp;
            }
        }

        function speakJapanese(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                
                let textToSpeak = text;
                
                // 尋找括號內的內容，支援半形或全形括號
                // 例如 "集まって (あつまって)" 或 "指 (Yubi)"
                const match = text.match(/\((.*?)\)/) || text.match(/（(.*?)）/);
                
                if (match && match[1]) {
                    // 如果有括號，就提取括號裡面的「純發音」給 Safari 唸
                    textToSpeak = match[1];
                } else {
                    // 如果沒有括號（例如 "パソコン"），通常是純假名，直接唸沒問題
                    textToSpeak = text;
                }

                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85; // 稍慢的語速
                window.speechSynthesis.speak(utterance);
            }
        }
        
        function nextWord() {
            currentIndex = (currentIndex + 1) % wordsData.length;
            cardInner.classList.remove('flipped');
            ratingButtons.classList.add('hidden');
            setTimeout(renderCard, 300);
        }

        // --- 動態等級與煙火特效邏輯 ---
        function updateScore() {
            scoreBoard.textContent = `⭐ 已記住：${score}`;
            
            // 每 5 題觸發一次升級特效
            if (score > 0 && score % 5 === 0) {
                let level = Math.floor(score / 5);
                triggerFireworks(level);
            }
        }

        function triggerFireworks(level) {
            // 如果超過 8 級，就一直維持在第 8 級的特效
            if (level > 8) level = 8;
            
            const now = Date.now();
            
            switch(level) {
                case 1:
                    // Level 1: 底部單次小噴發
                    confetti({ particleCount: 60, spread: 60, origin: { y: 0.8 } });
                    break;
                case 2:
                    // Level 2: 範圍更大、數量更多
                    confetti({ particleCount: 120, spread: 100, origin: { y: 0.7 } });
                    break;
                case 3:
                    // Level 3: 左右大砲雙管齊發
                    confetti({ particleCount: 100, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                    confetti({ particleCount: 100, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                    break;
                case 4:
                    // Level 4: 滿天星 (閃耀金黃色)
                    confetti({ 
                        particleCount: 150, 
                        spread: 120, 
                        origin: { y: 0.6 }, 
                        shapes: ['star'], 
                        colors: ['#FFD700', '#FFA500', '#FF8C00'] 
                    });
                    break;
                case 5:
                    // Level 5: 左右連續發射 (1.5秒)
                    const end5 = now + 1500;
                    (function frame5() {
                        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                        if (Date.now() < end5) requestAnimationFrame(frame5);
                    }());
                    break;
                case 6:
                    // Level 6: 浪漫降雪 (從頂部落下，持續2秒)
                    const end6 = now + 2000;
                    (function frame6() {
                        confetti({ 
                            particleCount: 12, spread: 180, 
                            origin: { y: -0.1, x: Math.random() }, 
                            startVelocity: 20, gravity: 0.6 
                        });
                        if (Date.now() < end6) requestAnimationFrame(frame6);
                    }());
                    break;
                case 7:
                    // Level 7: 多點煙火爆發 (持續2.5秒)
                    const end7 = now + 2500;
                    const interval7 = setInterval(function() {
                        if (Date.now() > end7) return clearInterval(interval7);
                        confetti({ 
                            particleCount: 60, startVelocity: 30, spread: 360, 
                            origin: { x: Math.random(), y: Math.random() - 0.2 },
                            zIndex: 1000
                        });
                    }, 300);
                    break;
                case 8:
                    // Level 8 (Max): 終極滿分狂歡 (全螢幕強烈大放送，持續3秒)
                    const end8 = now + 3000;
                    (function frame8() {
                        // 左右持續噴發
                        confetti({ particleCount: 12, angle: 60, spread: 60, origin: { x: 0, y: 0.8 }, zIndex: 1000 });
                        confetti({ particleCount: 12, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, zIndex: 1000 });
                        // 中間穿插星星
                        confetti({ particleCount: 5, spread: 120, origin: { y: 0.3, x: 0.5 }, shapes: ['star'], colors: ['#FFD700', '#FFF'] });
                        if (Date.now() < end8) requestAnimationFrame(frame8);
                    }());
                    break;
            }
        }

        // --- 事件監聽 ---
        document.getElementById('card-container').addEventListener('click', () => {
            if (isFlipped || wordsData.length === 0) return; 
            isFlipped = true;
            cardInner.classList.add('flipped');
            ratingButtons.classList.remove('hidden');
            speakJapanese(wordsData[currentIndex].jp);
        });

        topicSelect.addEventListener('change', loadData);
        modeSelect.addEventListener('change', renderCard);

        btnWrong.addEventListener('click', (e) => {
            e.stopPropagation();
            nextWord();
        });

        btnCorrect.addEventListener('click', (e) => {
            e.stopPropagation();
            score++;
            updateScore();
            nextWord();
        });

        // 啟動 App
        window.onload = initApp;
    </script>
</body>
</html>
